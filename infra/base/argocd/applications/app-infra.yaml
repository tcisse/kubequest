apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubequest-infra
  namespace: argocd
  labels:
    project: kubequest
    component: infra
spec:
  project: kubequest
  source:
    repoURL: https://github.com/tcisse/kubequest.git
    targetRevision: main
    path: infra/overlays/staging
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
