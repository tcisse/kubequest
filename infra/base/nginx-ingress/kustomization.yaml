apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ingress-nginx

helmCharts:
  - name: ingress-nginx
    repo: https://kubernetes.github.io/ingress-nginx
    version: "4.10.0"
    releaseName: nginx-ingress
    namespace: ingress-nginx
    valuesFile: values.yaml

resources:
  - namespace.yaml
