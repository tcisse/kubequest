loki:
  enabled: true
  nodeSelector:
    node-role: monitoring
  tolerations:
    - key: "dedicated"
      operator: "Equal"
      value: "monitoring"
      effect: "NoSchedule"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 5Gi

promtail:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

grafana:
  enabled: false  # Grafana géré par kube-prometheus-stack
  sidecar:
    datasources:
      defaultDatasourceEnabled: false  # évite le conflit isDefault avec Prometheus
