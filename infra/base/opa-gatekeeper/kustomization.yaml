apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gatekeeper-system

helmCharts:
  - name: gatekeeper
    repo: https://open-policy-agent.github.io/gatekeeper/charts
    version: "3.15.1"
    releaseName: gatekeeper
    namespace: gatekeeper-system
    valuesFile: values.yaml

resources:
  - namespace.yaml
  - constraints/template-required-labels.yaml
  - constraints/template-no-privileged.yaml
  - constraints/template-required-resources.yaml
  - constraints/constraint-required-labels.yaml
  - constraints/constraint-no-privileged.yaml
  - constraints/constraint-required-resources.yaml
