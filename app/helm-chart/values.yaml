# ─── Application ──────────────────────────────────────────────────────────────
app:
  name: kubequest-app
  image:
    repository: cissetaher/kubequest-app
    tag: "latest"
    pullPolicy: Always

  replicaCount: 2

  # Variables d'environnement non-sensibles
  env:
    APP_ENV: production
    APP_DEBUG: "false"
    APP_URL: "http://app2.kubequest.local"
    DB_CONNECTION: mysql
    DB_PORT: "3306"

  # Ressources (best practice : toujours définir limits + requests)
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Probes santé
  livenessProbe:
    httpGet:
      path: /health
      port: 80
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health
      port: 80
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 3

  # Anti-affinité pour distribuer les pods sur différents nodes
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - kubequest-app
          topologyKey: kubernetes.io/hostname

# ─── Service ──────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80
  targetPort: 80

# ─── Ingress ──────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  host: app.kubequest.local
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  tls: []   # Activer avec cert-manager (Phase 5)
  # tls:
  #   - secretName: app-tls
  #     hosts:
  #       - app.kubequest.local

# ─── HPA — Autoscaling ────────────────────────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ─── Secrets (valeurs de démo — utiliser des vraies en prod) ──────────────────
secrets:
  appKey: "base64:DJYTvaRkEZ/YcQsX3TMpB0iCjgme2rhlIOus9A1hnj4="
  dbPassword: "app_password"
  dbRootPassword: "app_root_password"

# ─── MySQL (chart Bitnami) ────────────────────────────────────────────────────
mysql:
  enabled: true
  # Bitnami a retire ses images versionnees de docker.io/bitnami en 2025.
  # Les tags sont desormais heberges dans le repo bitnamilegacy.
  image:
    registry: docker.io
    repository: bitnamilegacy/mysql
    tag: 8.0.36-debian-12-r8
  auth:
    database: app_database
    username: app_user
    # password et rootPassword injectés depuis le Secret K8s
    existingSecret: kubequest-app-secrets

  primary:
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    persistence:
      enabled: true
      size: 5Gi

  # Backup CronJob
  backup:
    enabled: true

# ─── Labels standardisés ──────────────────────────────────────────────────────
commonLabels:
  project: kubequest
  managed-by: helm
